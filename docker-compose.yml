name: gc-communication

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: gc-communication-admin:latest
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - .env
        environment:
            # Container-specific overrides (take precedence over .env)
            APP_ENV: ${APP_ENV:-production}
            APP_DEBUG: ${APP_DEBUG:-false}
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE:-gc_communication}
            DB_USERNAME: ${DB_USERNAME:-gc_user}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
            SESSION_DRIVER: database
            CACHE_STORE: database
            QUEUE_CONNECTION: database
            # Set APP_SEED=true on first boot to create the initial admin user.
            APP_SEED: ${APP_SEED:-false}
        ports:
            - "${APP_PORT:-8080}:80"
        volumes:
            - storage_data:/var/www/html/storage
        networks:
            - gcnet

    db:
        image: mysql:8.4
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-gc_communication}
            MYSQL_USER: ${DB_USERNAME:-gc_user}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s
        networks:
            - gcnet

volumes:
    storage_data:
    db_data:

networks:
    gcnet:
        driver: bridge
